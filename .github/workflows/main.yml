on:
  schedule:
  - cron: "0 4 * * *"
  push:
    branches:
    - main
  workflow_dispatch:

jobs:
  build-maps:
    name: "Build maps"
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - name: Prepare environment
      run: |
        cd garmin
        ./prepare.sh

    - name: Build maps
      run: |
        cd garmin
        wget -q https://download.geofabrik.de/europe/lithuania-latest.osm.pbf
        ./build-lt.sh lithuania-latest.osm.pbf

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: OSM Garmin Lithuania maps
        path: out
        if-no-files-found: error
        overwrite: true
        

        

    
